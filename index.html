<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<title>DW OS Developer Lab</title>
		<style>
			/* --- TEMEL AYARLAR --- */
			* {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
				-webkit-user-select: none;
				user-select: none;
			}

			body {
				background-color: #121212;
				color: #ffffff;
				font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
				height: 100vh;
				display: flex;
				flex-direction: column;
				padding: 20px;
				/* Ana bölümler arası boşluk */
				gap: 30px;
				overflow: hidden;
			}

			/* Üstteki boşluk div'i yerine body padding ve margin kullanmak daha temiz */
			.top-spacer {
				height: 40px;
			}

			/* --- ÜST KISIM (HEADER) --- */
			.header {
				margin-bottom: 10px;
			}
			.header h1 {
				font-size: 22px;
				color: #6366f1;
				margin-bottom: 4px;
			}
			.header p {
				font-size: 11px;
				color: #888;
				letter-spacing: 1.5px;
				font-weight: 600;
			}

			/* --- KULLANICI KARTI --- */
			.card {
				background: #1e1e1e;
				border: 1px solid #333;
				border-radius: 16px;
				padding: 20px;
				display: flex;
				align-items: center;
				gap: 15px;
				/* Kartın altına ekstra boşluk */
				margin-bottom: 5px;
				box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
			}
			.avatar {
				width: 50px;
				height: 50px;
				background: #6366f1;
				border-radius: 50%;
				display: flex;
				align-items: center;
				justify-content: center;
				font-weight: bold;
				font-size: 20px;
				box-shadow: 0 0 10px rgba(99, 102, 241, 0.4);
			}
			.user-info b {
				display: block;
				font-size: 16px;
				margin-bottom: 2px;
			}
			.user-info span {
				font-size: 13px;
				color: #aaa;
			}

			/* --- BUTONLAR (GRID) --- */
			.grid {
				display: grid;
				grid-template-columns: 1fr 1fr;
				gap: 15px;
				/* Grid altına boşluk */
				margin-bottom: 10px;
			}
			.btn {
				background: #2a2a2a;
				border: 1px solid #444;
				border-radius: 12px;
				padding: 16px;
				color: white;
				text-align: center;
				cursor: pointer;
				font-size: 14px;
				font-weight: 600;
				transition: all 0.2s ease;
			}
			.btn:hover {
				background: #333;
				border-color: #6366f1;
				transform: translateY(-2px);
			}
			.btn:active {
				transform: scale(0.96);
			}

			/* --- KONSOL (DEBUG) --- */
			.console-container {
				flex: 1;
				display: flex;
				flex-direction: column;
				min-height: 0;
				/* Konsolun üstüne biraz daha mesafe */
				margin-top: 10px;
			}
			.console-label {
				font-size: 11px;
				font-weight: bold;
				color: #6366f1;
				margin-bottom: 8px;
				text-transform: uppercase;
				letter-spacing: 0.5px;
			}
			#console-output {
				flex: 1;
				background: #000;
				border: 1px solid #333;
				border-radius: 12px;
				padding: 15px;
				font-family: 'Courier New', Courier, monospace;
				font-size: 12px;
				color: #00ff00;
				overflow-y: auto;
				white-space: pre-wrap;
				word-break: break-all;
				border-left: 3px solid #6366f1;
			}
		</style>
	</head>
	<body>
		<div class="top-spacer"></div>

		<div class="header">
			<h1>DW-OS Lab</h1>
			<p>VANILLA SDK TESTER</p>
		</div>

		<div class="card">
			<img class="avatar" id="avatar" src="" alt="Avatar">
			<div class="user-info">
				<b id="p-name">Yükleniyor...</b>
				<p>
					<span id="p-number">Veri bekleniyor</span>
				</p>
			</div>
		</div>

		<div class="grid">
			<div class="btn" onclick="runAction('getContacts')">REHBER ÇEK</div>
			<div class="btn" onclick="runAction('getMessages')">MESAJLAR</div>
			<div class="btn" onclick="runAction('openCamera')">KAMERA AÇ</div>
			<div class="btn" onclick="runAction('pickImage')">RESİM SEÇ</div>
			<div class="btn" onclick="runAction('getSession')">OTURUM AL</div>
			<div class="btn" onclick="runAction('getNotifications')">BILDIRIMLERI AL</div>
			<div class="btn" onclick="runAction('clearConsole')">TEMİZLE</div>
		</div>

		<div class="console-container">
			<div class="console-label">Sistem Logları</div>
			<div id="console-output">Sistem hazır. SDK bekleniyor...</div>
		</div>

		<script src="https://cfx-nui-dw-phone/phone/phone-sdk.js"></script>

		<script>
			const logBox = document.getElementById('console-output');

function printLog(msg, title = "INFO") {
const now = new Date().toLocaleTimeString();
const text = `\n[${now}] ${title}: ${
typeof msg === 'object' ? JSON.stringify(msg, null, 2) : msg
}`;
logBox.innerText += text;
logBox.scrollTop = logBox.scrollHeight;
}

window.onload = async () => {
printLog("Uygulama başlatıldı, 500ms bekleniyor...");

// Ana sistemin hazır olması için kısa bir bekleme
setTimeout(async () => {
try {
const session = await window.PhoneSDK.getSession();
document.getElementById('p-name').innerText = session.firstname + " " + session.lastname;
document.getElementById('p-number').innerText = session.phoneNumber || "No yok";
document.getElementById('avatar').src = session.avatar || "";
printLog(session, "SESSION_OK");
} catch (e) {
printLog(e, "SESSION_ERR");
}
}, 500);
};

async function runAction(type) {
printLog(`${type} isteği gönderiliyor...`, "SEND");
try {
let res;
if (type === 'getContacts') 
res = await window.PhoneSDK.getContacts();



if (type === 'getMessages') 
res = await window.PhoneSDK.getMessages();



if (type === 'openCamera') 
res = await window.PhoneSDK.openCameraView();



if (type === 'pickImage') 
res = await window.mediaPicker.image();



if (type === 'getNotifications') 
res = await window.PhoneSDK.getNotifications();



if (type === 'getSession') 
res = await window.PhoneSDK.getSession();



if (type === 'clearConsole') {
logBox.innerText = "";
printLog("Konsol temizlendi.", "INFO");
}


printLog(res || "İşlem başarılı (Dönen veri yok)", "RECEIVE");
} catch (e) {
printLog(e, "ACTION_ERR");
}
}
		</script>
	</body>
</html>
